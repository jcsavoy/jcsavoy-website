<!DOCTYPE html>
<html lang="en-us">
 <head>
  <meta charset="utf-8"/>
  <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title>Unsubscribed - JC Savoy</title>
  <style>
    :root {
      --cream: #FDF8F0;
      --rose: #C4867A;
      --charcoal: #3A3A3A;
      --text: #4A4040;
    }
    body {
      font-family: Georgia, serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      color: var(--charcoal);
      margin-bottom: 1rem;
    }
    p {
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: .85rem 2.2rem;
      border-radius: 50px;
      text-decoration: none;
      background: var(--rose);
      color: #fff;
      font-weight: 500;
    }
  </style>
 </head>
 <body>
  <div class="container">
    <h1>You've been unsubscribed.</h1>
    <p>We're sorry to see you go! You have been successfully removed from our mailing list. You won't receive any more emails from JC Savoy.</p>
    <p>If this was a mistake, you can always sign up again on our homepage.</p>
    <a href="index.html" class="btn">Back to Homepage</a>
  </div>
 </body>
</html>
